[manifest]
version = "1.0.0"
priority = 0

# Cast and other Buttons
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "local use = nil"
position = "after"
payload = '''
local cast = create_cast_button(card)
local other = create_other_button(card)
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "            sell"
position = "after"
payload = '''
          }},
          {n=G.UIT.R, config={align = 'cl'}, nodes={
            cast
          }},
          {n=G.UIT.R, config={align = 'cl'}, nodes={
            other
'''
match_indent = false
times = 1


# Mana Droplet UI
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "G.playing_cards = {}"
position = "before"
payload = '''
create_mana_UI()
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "G.hand:hard_set_VT()"
position = "before"
payload = '''
position_mana_UI()
'''
match_indent = true
times = 1
